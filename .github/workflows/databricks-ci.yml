name: Databricks Asset Bundles CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI authentication
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg

      - name: Set environment variables
        run: |
          echo "DEPLOY_ENV=dev" >> $GITHUB_ENV

      - name: Validate bundle configuration
        run: |
          echo "Validating Databricks Asset Bundle..."
          databricks bundle validate --target dev

      - name: Deploy bundle (on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to development environment..."
          databricks bundle deploy --target dev

      - name: Cleanup PR deployment (on PR close)
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: |
          echo "Cleaning up PR deployment..."
          databricks bundle destroy --target dev || true
