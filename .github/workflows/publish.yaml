name: publish

env:
  DB_PROFILES: ${{ secrets.DB_PROFILES }}

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      db_profile:
        type: string
        description: 'Databricks environment to publish HTML from'
        default: 'DEMO'
      db_path:
        type: string
        description: 'Repository path on databricks environment'
        required: true
      split_markdown:
        description: 'Splitting HTML by markdown'
        type: choice
        required: true
        default: 'false'
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  release:
    runs-on: html_publisher
    environment:
      name: ${{ github.ref_name == 'main' && 'github-pages' || 'preview' }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/databricks-industry-solutions/industry-solutions-release

      - name: Package solution accelerator
        run: |
          
          import os
          import configparser
          import io
          from databricks.solutions import Accelerator
          
          # Set defaults for automatic triggers (push to main)
          db_profile = '${{ github.event.inputs.db_profile }}' or 'DEMO'
          db_path = '${{ github.event.inputs.db_path }}' or '/Repos/production/esma_xml_ingestion'
          split_markdown_input = '${{ github.event.inputs.split_markdown }}' or 'false'
          
          config = configparser.ConfigParser()
          config.read_file(io.StringIO(os.environ['DB_PROFILES']))
          
          if db_profile not in config.sections():
            raise Exception(f'Profile "{db_profile}" is not supported. Available profiles: {", ".join(config.sections())}')
          
          config = config[db_profile]
          split_markdown = split_markdown_input == 'true'
          
          print(f"Publishing from Databricks workspace: {config['host']}")
          print(f"Notebook path: {db_path}")
          print(f"Split markdown: {split_markdown}")
          
          Accelerator(
            db_host=config['host'],
            db_token=config['token'],
            db_path=db_path,
            db_name='${{ github.event.repository.name }}',
            markdown=split_markdown,
          ).release()

        shell: python

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
